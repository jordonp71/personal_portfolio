version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-ecosystem:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
          - "@types/node"
      ui-deps:
        patterns:
          - lucide-react
          - framer-motion
          - tailwindcss
